<!doctype html><html lang="zh-CN"><head><meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{width:1280px;height:720px;font-family:'Noto Sans SC',sans-serif;color:#1a1a1a;background:#fff;overflow:hidden}
    :root{--c1:#1E293B;--c2:#D97706}
  </style></head><body><div style="width: 1280px; height: 720px; box-sizing: border-box; padding: 60px 80px; background: radial-gradient(135deg, #1E293B 0%, #0F172A 100%); color: #F8FAFC; font-family: 'Noto Sans SC', sans-serif; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden;">
    
    <!-- 背景装饰：光晕与几何线条，强化“从物到事”的升华感（限制溢出） -->
    <div style="position: absolute; top: 0px; right: 0px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(217, 119, 6, 0.15) 0%, rgba(0,0,0,0) 70%); pointer-events: none; overflow: hidden;"></div>
    <div style="position: absolute; bottom: 0px; left: 0px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(245, 158, 11, 0.08) 0%, rgba(0,0,0,0) 70%); pointer-events: none; overflow: hidden;"></div>
    
    <!-- 顶部：微型标识与分类 -->
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(248, 250, 252, 0.1); padding-bottom: 20px;">
        <span style="font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: #F59E0B; font-weight: 700;">THE EXPERIENCE ECONOMY</span>
        <span style="font-size: 14px; color: #64748B; font-weight: 500;">结语 · Q&A</span>
    </div>

    <!-- 中部核心：总结发言（左）与 互动联系（右） -->
    <div style="display: flex; justify-content: space-between; align-items: stretch; margin-top: 40px; margin-bottom: 40px; flex-grow: 1; overflow: hidden;">
        
        <!-- 左侧：金句与总结（占 55% 宽度） -->
        <div style="width: 55%; display: flex; flex-direction: column; justify-content: center; padding-right: 40px; overflow: hidden;">
            <h1 style="font-size: 48px; font-weight: 900; line-height: 1.25; margin: 0 0 24px 0; background: linear-gradient(to right, #F8FAFC, #F59E0B); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                从「物」出发<br>终至「事」成
            </h1>
            <p style="font-size: 18px; line-height: 1.8; color: #E2E8F0; margin: 0; font-weight: 300; text-align: justify;">
                在体验经济时代，单纯的“物理产品”已无法筑起竞争护城河。唯有超越功能属性，融入情感与场景，创造出<span style="color: #F59E0B; font-weight: 700; border-bottom: 2px solid #D97706; padding-bottom: 2px;">触动心灵的体验</span>，才能在用户心中生根发芽，实现持久而高溢价的品牌共鸣。
            </p>
        </div>

        <!-- 右侧：Q&A 与 联系方式（占 40% 宽度） -->
        <div style="width: 40%; background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(245, 158, 11, 0.2); border-radius: 16px; padding: 40px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 20px 40px rgba(0,0,0,0.3); overflow: hidden;">
            
            <!-- Q&A 引导 -->
            <div>
                <div style="display: inline-block; background: #D97706; color: #F8FAFC; font-size: 12px; font-weight: 900; padding: 4px 12px; border-radius: 4px; letter-spacing: 1px; margin-bottom: 16px;">ASK ME ANYTHING</div>
                <h3 style="font-size: 28px; font-weight: 700; margin: 0 0 8px 0; color: #F8FAFC;">交流与答疑</h3>
                <p style="font-size: 14px; color: #94A3B8; margin: 0;">期待您的提问，让我们共同探讨体验的边界</p>
            </div>

            <!-- 分割线 -->
            <div style="height: 1px; background: rgba(248, 250, 252, 0.1); margin: 24px 0;"></div>

            <!-- 联系方式 -->
            <div style="display: flex; flex-direction: column; gap: 16px; overflow: hidden;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div style="width: 32px; height: 32px; border-radius: 50%; background: rgba(245, 158, 11, 0.1); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                        <span style="color: #F59E0B; font-size: 14px; font-weight: bold;">M</span>
                    </div>
                    <div style="overflow: hidden;">
                        <div style="font-size: 12px; color: #64748B;">电子邮箱</div>
                        <div style="font-size: 15px; color: #F8FAFC; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">contact@experience-design.com</div>
                    </div>
                </div>
                
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div style="width: 32px; height: 32px; border-radius: 50%; background: rgba(245, 158, 11, 0.1); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                        <span style="color: #F59E0B; font-size: 14px; font-weight: bold;">W</span>
                    </div>
                    <div style="overflow: hidden;">
                        <div style="font-size: 12px; color: #64748B;">官方网站</div>
                        <div style="font-size: 15px; color: #F8FAFC; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">www.experience-design.com</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- 底部：版权声明 -->
    <div style="display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #64748B;">
        <span>© 2024 体验经济与品牌溢价研究小组</span>
        <span>THANK YOU</span>
    </div>

</div></body></html>
