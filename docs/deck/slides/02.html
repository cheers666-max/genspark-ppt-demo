<!doctype html><html lang="zh-CN"><head><meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{width:1280px;height:720px;font-family:'Noto Sans SC',sans-serif;color:#1a1a1a;background:#fff;overflow:hidden}
    :root{--c1:#1E293B;--c2:#D97706}
  </style></head><body><div style="width: 1280px; height: 720px; background-color: #F8FAFC; background-image: radial-gradient(circle at 100% 0%, #F1F5F9 0%, #F8FAFC 100%); font-family: 'Noto Sans SC', sans-serif; padding: 0; margin: 0; box-sizing: border-box; position: relative; overflow: hidden; display: flex; flex-direction: row;">
    
    <!-- 装饰背景元素 - 限制在画布内 -->
    <div style="position: absolute; top: 0px; left: 0px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(217,119,6,0.05) 0%, rgba(255,255,255,0) 70%); pointer-events: none; overflow: hidden;"></div>
    <div style="position: absolute; bottom: 0px; right: 0px; width: 250px; height: 250px; border-radius: 50%; background: radial-gradient(circle, rgba(30,41,59,0.03) 0%, rgba(255,255,255,0) 70%); pointer-events: none; overflow: hidden;"></div>
    
    <!-- 左侧：大标题与主题定位 -->
    <div style="width: 440px; height: 100%; background-color: #1E293B; padding: 80px 50px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; position: relative; box-shadow: 10px 0 30px rgba(30,41,59,0.15); z-index: 10;">
        <!-- 顶部装饰线 -->
        <div style="width: 60px; height: 4px; background-color: #D97706; border-radius: 2px;"></div>
        
        <!-- 核心标题区 -->
        <div style="margin-top: -40px;">
            <div style="font-size: 16px; color: #F59E0B; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px;">CONTENTS</div>
            <h1 style="font-size: 48px; color: #F8FAFC; font-weight: 900; margin: 0; line-height: 1.2; letter-spacing: 2px;">目录</h1>
            <div style="width: 100%; height: 1px; background-color: rgba(248,250,252,0.15); margin: 30px 0;"></div>
            <p style="font-size: 15px; color: #94A3B8; line-height: 1.8; margin: 0; font-weight: 300; letter-spacing: 0.5px;">
                体验经济的日本路径：<br>
                探索从“物质满足”向“精神共鸣”转型的商业场景与落地方法论。
            </p>
        </div>
        
        <!-- 底部副标题/标识 -->
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="width: 8px; height: 8px; background-color: #D97706; border-radius: 50%;"></div>
            <span style="font-size: 12px; color: #64748B; letter-spacing: 2px; font-weight: 500; text-transform: uppercase;">EXPERIENCE ECONOMY</span>
        </div>
    </div>

    <!-- 右侧：目录条目列表 -->
    <div style="flex: 1; height: 100%; padding: 80px 80px 80px 70px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center;">
        
        <!-- 目录条目容器 -->
        <div style="display: flex; flex-direction: column; gap: 24px;">
            
            <!-- 条目 03 -->
            <div style="display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background-color: #FFFFFF; border-radius: 12px; box-shadow: 0 4px 20px rgba(30,41,59,0.03); border-left: 4px solid #D97706; transition: all 0.3s ease;">
                <div style="display: flex; align-items: center; gap: 24px;">
                    <span style="font-size: 24px; font-weight: 800; color: #D97706; font-family: 'Georgia', serif; width: 30px;">03</span>
                    <span style="font-size: 18px; font-weight: 700; color: #1E293B; letter-spacing: 0.5px;">数据解构：日本年轻一代的“体验型消费”崛起</span>
                </div>
                <div style="font-size: 14px; font-weight: 600; color: #64748B; background-color: #F1F5F9; padding: 4px 12px; border-radius: 20px;">P 03</div>
            </div>

            <!-- 条目 04 -->
            <div style="display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background-color: #FFFFFF; border-radius: 12px; box-shadow: 0 4px 20px rgba(30,41,59,0.03); border-left: 4px solid #1E293B; transition: all 0.3s ease;">
                <div style="display: flex; align-items: center; gap: 24px;">
                    <span style="font-size: 24px; font-weight: 800; color: #1E293B; font-family: 'Georgia', serif; width: 30px;">04</span>
                    <span style="font-size: 18px; font-weight: 700; color: #1E293B; letter-spacing: 0.5px;">茑屋书店：不卖书，卖“生活方式提案”</span>
                </div>
                <div style="font-size: 14px; font-weight: 600; color: #64748B; background-color: #F1F5F9; padding: 4px 12px; border-radius: 20px;">P 04</div>
            </div>

            <!-- 条目 05 -->
            <div style="display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background-color: #FFFFFF; border-radius: 12px; box-shadow: 0 4px 20px rgba(30,41,59,0.03); border-left: 4px solid #1E293B; transition: all 0.3s ease;">
                <div style="display: flex; align-items: center; gap: 24px;">
                    <span style="font-size: 24px; font-weight: 800; color: #1E293B; font-family: 'Georgia', serif; width: 30px;">05</span>
                    <span style="font-size: 18px; font-weight: 700; color: #1E293B; letter-spacing: 0.5px;">空间叙事：MUJI Base 与星巴克臻选的增值密码</span>
                </div>
                <div style="font-size: 14px; font-weight: 600; color: #64748B; background-color: #F1F5F9; padding: 4px 12px; border-radius: 20px;">P 05</div>
            </div>

            <!-- 条目 06 -->
            <div style="display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background-color: #FFFFFF; border-radius: 12px; box-shadow: 0 4px 20px rgba(30,41,59,0.03); border-left: 4px solid #1E293B; transition: all 0.3s ease;">
                <div style="display: flex; align-items: center; gap: 24px;">
                    <span style="font-size: 24px; font-weight: 800; color: #1E293B; font-family: 'Georgia', serif; width: 30px;">06</span>
                    <span style="font-size: 18px; font-weight: 700; color: #1E293B; letter-spacing: 0.5px;">落地方法论：如何将您的品牌“事”态化</span>
                </div>
                <div style="font-size: 14px; font-weight: 600; color: #64748B; background-color: #F1F5F9; padding: 4px 12px; border-radius: 20px;">P 06</div>
            </div>

        </div>
    </div>
</div></body></html>
