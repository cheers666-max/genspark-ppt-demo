<!doctype html><html lang="zh-CN"><head><meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--c1:#1A2B4C;--c2:#E65F2B;--c3:#64748B;--paper:#F8F9FA;--ink:#1a1a1a}
    html,body{width:1280px;height:720px;overflow:hidden}
    body{font-family:'Noto Sans SC','PingFang SC',sans-serif;color:var(--ink);background:var(--paper);position:relative}
    img{max-width:100%;display:block}
  </style></head><body><div style="width: 1280px; height: 720px; box-sizing: border-box; padding: 60px 80px; background-color: var(--paper); color: var(--ink); display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; position: relative;">
    
    <!-- 顶部：分类与装饰线 -->
    <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
        <span style="font-size: 14px; color: var(--c3); letter-spacing: 2px; font-weight: 700; text-transform: uppercase;">MARKETING PARADIGM SHIFT</span>
        <div style="flex-grow: 1; height: 1px; background-color: var(--c3); opacity: 0.3; margin-left: 20px;"></div>
    </div>

    <!-- 中部：核心内容区（左右非对称布局） -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px; margin-bottom: 20px; height: 460px;">
        
        <!-- 左侧：文本与逻辑链条 -->
        <div style="width: 580px; display: flex; flex-direction: column; justify-content: space-between; height: 100%;">
            
            <!-- 主标题 -->
            <div>
                <h1 style="font-size: 44px; line-height: 1.25; color: var(--c1); margin: 0 0 16px 0; font-weight: 900; letter-spacing: -0.5px;">
                    从「物」到「事」：<br>
                    <span style="color: var(--c2);">日本体验经济</span>的营销范式重塑
                </h1>
                <p style="font-size: 18px; line-height: 1.6; color: var(--c3); margin: 0; font-weight: 500;">
                    解析日本消费者从物质满足走向精神共鸣、体验至上的商业转型逻辑
                </p>
            </div>

            <!-- 核心逻辑对比卡片 -->
            <div style="display: flex; gap: 20px; margin-top: 20px;">
                <!-- 阶段一 -->
                <div style="flex: 1; background-color: rgba(26, 43, 76, 0.03); border-left: 4px solid var(--c1); padding: 20px; border-radius: 0 8px 8px 0;">
                    <div style="font-size: 12px; color: var(--c3); font-weight: bold; margin-bottom: 8px; letter-spacing: 1px;">STAGE 01 / 传统物性</div>
                    <div style="font-size: 20px; color: var(--c1); font-weight: bold; margin-bottom: 6px;">「物」的满足</div>
                    <div style="font-size: 14px; color: var(--ink); opacity: 0.8; line-height: 1.5;">关注功能属性、拥有权与彰显身份的物质占有。</div>
                </div>
                <!-- 阶段二 -->
                <div style="flex: 1; background-color: rgba(230, 95, 43, 0.03); border-left: 4px solid var(--c2); padding: 20px; border-radius: 0 8px 8px 0;">
                    <div style="font-size: 12px; color: var(--c2); font-weight: bold; margin-bottom: 8px; letter-spacing: 1px;">STAGE 02 / 现代体验</div>
                    <div style="font-size: 20px; color: var(--c2); font-weight: bold; margin-bottom: 6px;">「事」的共鸣</div>
                    <div style="font-size: 14px; color: var(--ink); opacity: 0.8; line-height: 1.5;">强调时间消费、精神连接与不可复制的场景体验。</div>
                </div>
            </div>

        </div>

        <!-- 右侧：视觉意象与数据指标 -->
        <div style="width: 480px; height: 100%; position: relative; display: flex; flex-direction: column; justify-content: space-between;">
            <!-- 意象图片 -->
            <div style="width: 100%; height: 320px; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.1);">
                <img src="https://picsum.photos/seed/%E4%BB%8E%E3%80%8C%E0/800/600" style="width: 100%; height: 100%; object-fit: cover;" alt="日本体验经济">
            </div>
            
            <!-- 底部关键指标 -->
            <div style="display: flex; justify-content: space-between; align-items: center; background-color: var(--c1); color: #ffffff; padding: 20px 30px; border-radius: 12px; height: 110px; box-sizing: border-box;">
                <div>
                    <div style="font-size: 12px; color: rgba(255,255,255,0.6); letter-spacing: 1px; margin-bottom: 4px;">EXPERIENCE VALUE</div>
                    <div style="font-size: 16px; font-weight: bold; color: #ffffff;">非物质消费支出占比</div>
                </div>
                <div style="display: flex; align-items: baseline;">
                    <span style="font-size: 48px; font-weight: 900; color: var(--c2); line-height: 1;">78</span>
                    <span style="font-size: 20px; font-weight: bold; color: var(--c2); margin-left: 4px;">%</span>
                </div>
            </div>
        </div>

    </div>

    <!-- 底部：页码与版权 -->
    <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
        <span style="font-size: 12px; color: var(--c3);">© JAPAN MARKETING INSIGHT 2024</span>
        <span style="font-size: 14px; font-weight: bold; color: var(--c1);">01</span>
    </div>

</div></body></html>
