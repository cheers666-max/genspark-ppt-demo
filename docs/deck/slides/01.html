<!doctype html><html lang="zh-CN"><head><meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{width:1280px;height:720px;font-family:'Noto Sans SC',sans-serif;color:#1a1a1a;background:#fff;overflow:hidden}
    :root{--c1:#1E293B;--c2:#D97706}
  </style></head><body><div style="width: 1280px; height: 720px; background-color: #1E293B; font-family: 'Noto Sans SC', sans-serif; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: space-between; padding: 0 80px; box-sizing: border-box;">
    
    <!-- 背景装饰：日式极简几何线条与渐变暗纹（调整位置和大小，防止溢出画布） -->
    <div style="position: absolute; top: 0px; right: 0px; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(217,119,6,0.08) 0%, rgba(30,41,59,0) 70%); pointer-events: none;"></div>
    <div style="position: absolute; bottom: 10px; left: 10px; width: 240px; height: 240px; border: 1px dashed rgba(248, 250, 252, 0.05); border-radius: 50%; pointer-events: none;"></div>
    
    <!-- 左侧：核心内容区域 -->
    <div style="max-width: 620px; z-index: 10; display: flex; flex-direction: column; justify-content: center;">
        
        <!-- 行业标签/副标题 -->
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 28px;">
            <span style="background-color: #D97706; color: #F8FAFC; font-size: 14px; font-weight: 700; letter-spacing: 2px; padding: 6px 16px; border-radius: 4px; text-transform: uppercase;">JAPAN MARKETING</span>
            <div style="width: 40px; height: 1px; background-color: #64748B;"></div>
            <span style="color: #F59E0B; font-size: 16px; font-weight: 500; letter-spacing: 1px;">消费社会学 · 体验经济</span>
        </div>

        <!-- 主标题 -->
        <h1 style="margin: 0 0 24px 0; padding: 0; font-size: 48px; font-weight: 900; line-height: 1.25; color: #F8FAFC; letter-spacing: -0.5px;">
            现代日本营销策略：<br>
            <span style="background: linear-gradient(to right, #F8FAFC, #F59E0B); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">从「物」到「事」</span>的体验经济打法
        </h1>

        <!-- 核心概念阐释 -->
        <p style="margin: 0 0 40px 0; font-size: 16px; line-height: 1.8; color: #64748B; font-weight: 400;">
            深度解析日本消费市场从<strong style="color: #F8FAFC; font-weight: 700;">“物质满足”（Mono）</strong>向<strong style="color: #F59E0B; font-weight: 700;">“精神共鸣”（Koto）</strong>转型的核心路径。在存量时代，如何通过场景构建、情绪价值与叙事美学，重塑品牌与消费者的深度连接。
        </p>

        <!-- 底部作者/机构信息 -->
        <div style="display: flex; align-items: center; gap: 32px; border-top: 1px solid rgba(100, 116, 139, 0.2); padding-top: 24px;">
            <div>
                <div style="font-size: 12px; color: #64748B; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px;">RESEARCH THEME</div>
                <div style="font-size: 15px; color: #F8FAFC; font-weight: 500;">日本消费社会转型与商业创新</div>
            </div>
            <div style="width: 1px; height: 30px; background-color: rgba(100, 116, 139, 0.2);"></div>
            <div>
                <div style="font-size: 12px; color: #64748B; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px;">STRATEGY FRAME</div>
                <div style="font-size: 15px; color: #F59E0B; font-weight: 500;">「Mono to Koto」</div>
            </div>
        </div>
    </div>

    <!-- 右侧：视觉创意区域（调整定位与尺寸，确保所有子元素不溢出右侧和底部边界） -->
    <div style="position: relative; width: 440px; height: 520px; z-index: 10; margin-right: 20px;">
        
        <!-- 装饰性背景框 -->
        <div style="position: absolute; top: 20px; left: -10px; width: 400px; height: 460px; border: 2px solid #D97706; border-radius: 12px; opacity: 0.3; pointer-events: none;"></div>
        
        <!-- 主图：现代日本都市/商业空间（代表现代营销） -->
        <div style="position: absolute; top: 0; right: 10px; width: 380px; height: 440px; border-radius: 12px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid rgba(248, 250, 252, 0.1);">
            <img src="https://picsum.photos/seed/%E7%8E%B0%E4%BB%A3%E0/800/600" alt="Modern Japan" style="width: 100%; height: 100%; object-fit: cover; filter: grayscale(20%) contrast(110%);">
            <!-- 渐变遮罩 -->
            <div style="position: absolute; inset: 0; background: linear-gradient(to top, rgba(30, 41, 59, 0.8) 0%, rgba(30, 41, 59, 0) 50%);"></div>
        </div>

        <!-- 辅图：禅意/细节特写（代表“事”与精神共鸣），悬浮重叠 -->
        <div style="position: absolute; bottom: 20px; left: -20px; width: 200px; height: 200px; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.6); border: 4px solid #1E293B;">
            <img src="https://picsum.photos/seed/%E7%8E%B0%E4%BB%A3%E1/800/600" alt="Zen Concept" style="width: 100%; height: 100%; object-fit: cover;">
        </div>

        <!-- 浮动标签：Mono to Koto -->
        <div style="position: absolute; right: 10px; bottom: 120px; background-color: #F59E0B; color: #1E293B; padding: 10px 18px; border-radius: 6px; font-weight: 900; font-size: 14px; letter-spacing: 1px; box-shadow: 0 10px 15px -3px rgba(245, 158, 11, 0.3); transform: rotate(90deg); transform-origin: bottom right;">
            もの から こと へ
        </div>
    </div>

</div></body></html>
